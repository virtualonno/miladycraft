
#Server configuration settings
[server]
# Entity and BlockEntity error handling
removeErroringBlockEntities = true
removeErroringEntities = true

# Movement mechanics
fullBoundingBoxLadders = false

# Mob spawning tweaks
zombieBaseSummonChance = 0.1
zombieBabyChance = 0.05

# Performance optimizations
fixAdvancementLoading = true
permissionHandler = "forge:default_handler"

# Network optimizations
networkCompressionThreshold = 512
maxPacketSize = 8388608

# Chunk loading
# maxTickBlockEntityTime = 300

